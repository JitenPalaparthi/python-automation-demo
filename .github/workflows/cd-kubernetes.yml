name: CD - Deploy to Kubernetes

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: read

env:
  NAMESPACE: playwright-demo
  DEPLOYMENT_NAME: playwright-python-demo
  CONTAINER_NAME: app

jobs:
  deploy:
    name: Deploy to Kubernetes
    runs-on: [self-hosted, linux, x64, k8s-deployer]

    environment:
      name: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set image tag
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "IMAGE_TAG=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=latest" >> $GITHUB_ENV
          fi

      - name: Verify kubectl access
        run: |
          kubectl version --client
          kubectl get ns

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/all-in-one.yaml

      - name: Update deployment image
        run: |
          kubectl -n "$NAMESPACE" set image deployment/"$DEPLOYMENT_NAME" \
            "$CONTAINER_NAME"="$IMAGE_NAME:$IMAGE_TAG"

      - name: Wait for rollout
        run: |
          kubectl -n "$NAMESPACE" rollout status deployment/"$DEPLOYMENT_NAME" --timeout=180s

      - name: Show deployment details
        if: always()
        run: |
          kubectl -n "$NAMESPACE" get deployment "$DEPLOYMENT_NAME" -o wide
          kubectl -n "$NAMESPACE" get pods -o wide
          kubectl -n "$NAMESPACE" get svc -o wide