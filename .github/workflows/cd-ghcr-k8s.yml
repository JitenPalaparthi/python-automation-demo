name: CD - Build GHCR and Deploy to Kubernetes

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  NAMESPACE: playwright-demo
  DEPLOYMENT_NAME: playwright-python-demo
  CONTAINER_NAME: app

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci_for_release:
    name: CI for Release
    runs-on: ubuntu-latest

    outputs:
      image_name: ${{ steps.vars.outputs.image_name }}
      image_tag: ${{ steps.vars.outputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image variables
        id: vars
        shell: bash
        run: |
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY,,}"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            IMAGE_TAG="${GITHUB_REF_NAME}"
          else
            IMAGE_TAG="manual-$(date +%Y%m%d%H%M%S)"
          fi

          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

          echo "IMAGE_NAME=$IMAGE_NAME" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run lint
        shell: bash
        run: |
          ruff check .

      - name: Run tests
        shell: bash
        run: |
          pytest

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:latest
          provenance: false
          sbom: false

  deploy:
    name: Deploy to Kubernetes
    needs: ci_for_release
    runs-on: [self-hosted, linux, ARM64]

    environment:
      name: production

    permissions:
      contents: read
      packages: read

    env:
      IMAGE_NAME: ${{ needs.ci_for_release.outputs.image_name }}
      IMAGE_TAG: ${{ needs.ci_for_release.outputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify kubectl access
        shell: bash
        run: |
          kubectl version --client
          kubectl get nodes
          kubectl get ns

      - name: Apply Kubernetes manifests
        shell: bash
        run: |
          kubectl apply -f k8s/all-in-one.yaml

      - name: Update deployment image
        shell: bash
        run: |
          kubectl -n "$NAMESPACE" set image deployment/"$DEPLOYMENT_NAME" \
            "$CONTAINER_NAME"="$IMAGE_NAME:$IMAGE_TAG"

      - name: Wait for rollout
        shell: bash
        run: |
          kubectl -n "$NAMESPACE" rollout status deployment/"$DEPLOYMENT_NAME" --timeout=300s

      - name: Show deployment details
        if: always()
        shell: bash
        run: |
          kubectl -n "$NAMESPACE" get deployment "$DEPLOYMENT_NAME" -o wide
          kubectl -n "$NAMESPACE" get pods -o wide
          kubectl -n "$NAMESPACE" get svc -o wide