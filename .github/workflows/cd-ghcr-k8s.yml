name: CD - Build GHCR and Deploy to Kubernetes

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  NAMESPACE: playwright-demo
  DEPLOYMENT_NAME: playwright-python-demo
  CONTAINER_NAME: app

concurrency:
  group: cd-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: false

jobs:
  build_and_push:
    name: Build and Push Multi-Arch Image
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        startsWith(github.event.workflow_run.head_branch, 'refs/') == false
      )
    runs-on: ubuntu-latest

    outputs:
      image_name: ${{ steps.vars.outputs.image_name }}
      image_tag: ${{ steps.vars.outputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set image variables
        id: vars
        shell: bash
        run: |
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY,,}"

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_run" ]]; then
            IMAGE_TAG="${{ github.event.workflow_run.head_branch }}"
          else
            IMAGE_TAG="manual-$(date +%Y%m%d%H%M%S)"
          fi

          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

          echo "IMAGE_NAME=$IMAGE_NAME" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"

      - name: Stop unless this is a tag-triggered release
        if: github.event_name == 'workflow_run'
        shell: bash
        run: |
          echo "workflow_run detected. This workflow should be used with release tags via workflow_dispatch or a dedicated tag workflow."
          exit 1