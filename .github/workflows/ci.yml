name: CI

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      # - name: Run lint
      #   shell: bash
      #   run: |
      #     ruff check .

      - name: Run tests
        shell: bash
        run: |
          pytest
      - name: Run tests
        shell: bash
        run: |
          pytest -ra -q --junitxml=pytest-report.xml

      - name: Upload pytest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: pytest-report.xml

      - name: Publish pytest summary
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import os
          import xml.etree.ElementTree as ET
          from pathlib import Path

          report = Path("pytest-report.xml")
          summary = Path(os.environ["GITHUB_STEP_SUMMARY"])

          if not report.exists():
              with summary.open("a", encoding="utf-8") as f:
                  f.write("## Pytest Summary\n\nNo pytest XML report found.\n")
              raise SystemExit(0)

          root = ET.parse(report).getroot()

          if root.tag == "testsuites":
              suites = root.findall("testsuite")
              tests = sum(int(s.attrib.get("tests", 0)) for s in suites)
              failures = sum(int(s.attrib.get("failures", 0)) for s in suites)
              errors = sum(int(s.attrib.get("errors", 0)) for s in suites)
              skipped = sum(int(s.attrib.get("skipped", 0)) for s in suites)
          else:
              tests = int(root.attrib.get("tests", 0))
              failures = int(root.attrib.get("failures", 0))
              errors = int(root.attrib.get("errors", 0))
              skipped = int(root.attrib.get("skipped", 0))

          passed = tests - failures - errors - skipped

          with summary.open("a", encoding="utf-8") as f:
              f.write("## Pytest Summary\n\n")
              f.write("| Metric | Count |\n")
              f.write("|---|---:|\n")
              f.write(f"| Total | {tests} |\n")
              f.write(f"| Passed | {passed} |\n")
              f.write(f"| Failed | {failures} |\n")
              f.write(f"| Errors | {errors} |\n")
              f.write(f"| Skipped | {skipped} |\n")
          PY